<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fix My Ugly City</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Arial, sans-serif;
  background:#0f1117;
  color:#e6e6e6;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1 {margin-bottom:10px;}
.card {
  background:#181b22;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary {background:#4f7cff;color:white;}
.ghost {background:transparent;border:1px solid #555;color:#ccc;}

.checkbox-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.hidden {display:none;}

.score {
  font-size:40px;
  margin-bottom:10px;
}

.snapshot {
  background:#222;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

img {
  width:100%;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🏙️ Fix My Ugly City</h1>

  <div class="grid">
    <div class="card">
      <h2>City Review</h2>

      <form id="form">
        <input id="name" placeholder="City name">

        <select id="style">
          <option value="realistic">Realistic</option>
          <option value="american">American</option>
          <option value="european">European</option>
          <option value="suburban">Suburban</option>
          <option value="dense">Dense</option>
        </select>

        <div class="checkbox-grid">
          <label><input type="checkbox" value="gridy"> Too gridy</label>
          <label><input type="checkbox" value="downtown"> Boring downtown</label>
          <label><input type="checkbox" value="water"> Ugly waterfront</label>
          <label><input type="checkbox" value="same"> Same everywhere</label>
          <label><input type="checkbox" value="focal"> No focal point</label>
          <label><input type="checkbox" value="terrain"> Ignores terrain</label>
        </div>

        <input type="file" id="img">

        <button type="submit" class="primary">Analyze</button>
      </form>
    </div>

    <div class="card">
      <h2>Results</h2>

      <div id="results" class="hidden">
        <div class="score" id="score">0</div>
        <div id="label"></div>

        <h3>Problems</h3>
        <ul id="problems"></ul>

        <h3>Fixes</h3>
        <ul id="fixes"></ul>

        <img id="preview" class="hidden" alt="City preview">

        <button id="save" class="primary" type="button">Save Snapshot</button>
      </div>

      <div id="empty">Run an analysis</div>
    </div>
  </div>

  <div class="card">
    <h2>Snapshots</h2>
    <button id="undo" class="ghost" type="button">Undo</button>
    <button id="clear" class="ghost" type="button">Clear</button>

    <div id="snapshots"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
