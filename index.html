<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedTrack</title>

<style>
*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  background:#0d0d0d;
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
}

html{
  -webkit-text-size-adjust:100%;
}

body{
  display:flex;
  justify-content:center;
}

.app-shell{
  width:100%;
  max-width:520px;
  padding:10px 0 30px;
}

.phone-panel{
  background:#0d0d0d;
  border-radius:18px;
  overflow:hidden;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  gap:10px;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

.brand-icon{
  width:18px;
  height:18px;
  background:linear-gradient(135deg,#fff 0 45%,#6fdc2f 45% 100%);
  clip-path:polygon(
    35% 0%,65% 0%,
    65% 35%,100% 35%,
    100% 65%,65% 65%,
    65% 100%,35% 100%,
    35% 65%,0% 65%,
    0% 35%,35% 35%
  );
  flex:0 0 auto;
}

.brand-text{
  font-weight:700;
  white-space:nowrap;
}

.brand-text .track{
  color:#6fdc2f;
}

.top-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex:0 0 auto;
}

.undo-btn{
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:11px;
  font-weight:700;
  padding:8px 12px;
  cursor:pointer;
  white-space:nowrap;
}

.undo-btn:disabled{
  opacity:0.45;
  cursor:not-allowed;
}

.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#6fdc2f;
}

.save-status{
  text-align:center;
  font-size:12px;
  padding:6px;
  color:rgba(255,255,255,0.6);
  min-height:24px;
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,0.07);
}

.left{
  flex:1;
  min-width:0;
}

.right{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  flex:0 0 auto;
  white-space:nowrap;
}

.med-name{
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
}

.med-plan{
  font-size:11px;
  color:rgba(255,255,255,0.42);
  line-height:1.3;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

.med-time{
  font-size:12px;
  color:rgba(255,255,255,0.55);
  line-height:1.3;
  margin-bottom:4px;
}

.med-next{
  font-size:12px;
  color:#6fdc2f;
  line-height:1.35;
}

.dose-select{
  width:52px;
  min-width:52px;
  max-width:52px;
  border:none;
  outline:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:12px;
  font-weight:700;
  padding:10px 8px;
  appearance:none;
  -webkit-appearance:none;
  text-align:center;
  text-align-last:center;
  cursor:pointer;
}

.dose-select option{
  color:#000;
}

.take-btn{
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#73dc34,#58c71c);
  color:#fff;
  font-size:12px;
  font-weight:700;
  padding:10px 12px;
  cursor:pointer;
  white-space:nowrap;
}

.take-btn.wait-state{
  background:rgba(255,255,255,0.12);
}

.activity-wrap{
  padding:14px 16px 16px;
  border-top:1px solid rgba(255,255,255,0.06);
}

.activity-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:10px;
}

.activity-list{
  padding-bottom:10px;
}

.activity-day{
  margin-bottom:12px;
}

.activity-day-header{
  font-size:11px;
  color:rgba(255,255,255,0.42);
  text-transform:uppercase;
  letter-spacing:0.08em;
  padding-top:8px;
  margin-bottom:8px;
  border-top:1px solid rgba(255,255,255,0.08);
}

.activity-day:first-child .activity-day-header{
  padding-top:0;
  border-top:none;
}

.activity-item{
  font-size:12px;
  color:rgba(255,255,255,0.55);
  line-height:1.3;
  margin-bottom:6px;
}

.activity-item:last-child{
  margin-bottom:0;
}

.empty-activity{
  font-size:12px;
  color:rgba(255,255,255,0.55);
  line-height:1.3;
}

.manual-wrap{
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.08);
}

.manual-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:10px;
}

.manual-sub{
  font-size:12px;
  color:rgba(255,255,255,0.5);
  line-height:1.35;
  margin-bottom:10px;
}

.manual-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}

.manual-row{
  display:flex;
  gap:8px;
}

.manual-select,
.manual-btn{
  border:none;
  outline:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-size:12px;
  font-weight:700;
  padding:11px 10px;
  appearance:none;
  -webkit-appearance:none;
}

.manual-select option{
  color:#000;
}

.manual-btn{
  background:linear-gradient(180deg,#73dc34,#58c71c);
  cursor:pointer;
}

.manual-row .manual-select{
  flex:1;
  min-width:0;
}

.manual-time-select{
  flex:1;
  min-width:0;
}

@media (max-width:420px){
  .row{
    align-items:center;
  }

  .right{
    flex-direction:row;
    align-items:center;
    width:auto;
    min-width:unset;
  }

  .dose-select{
    width:48px;
    min-width:48px;
    max-width:48px;
    padding:10px 6px;
  }

  .take-btn{
    padding:10px 10px;
    font-size:11px;
  }
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<div class="app-shell">
  <div class="phone-panel">

    <div class="topbar">
      <div class="brand">
        <div class="brand-icon"></div>
        <div class="brand-text">
          Med<span class="track">Track</span>
        </div>
      </div>

      <div class="top-right">
        <button id="undoBtn" class="undo-btn">UNDO</button>
        <div class="status-dot"></div>
      </div>

    <div id="status" class="save-status"></div>

    <div class="activity-wrap">

      <div class="manual-wrap">
        <div class="manual-title">Add Missed Log</div>
        <div class="manual-sub">Same day only. Pick the med and the time you actually took it.</div>

        <div class="manual-grid">
          <div class="manual-row">
            <select id="manualMed" class="manual-select"></select>

          <div class="manual-row">

              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>

          <button id="manualAddBtn" class="manual-btn">ADD LOG</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDoLMrezxwkfLc2JVS2byakA8Sz0ST6E-Y",
  authDomain: "med-tracker-17c25.firebaseapp.com",
  projectId: "med-tracker-17c25",
  storageBucket: "med-tracker-17c25.firebasestorage.app",
  messagingSenderId: "558108201833",
  appId: "1:558108201833:web:17028d4da0c3f4befea3f8"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

const HISTORY_LIMIT = 30;

const meds = [
  {
    name: "Ibuprofen 200mg",
    type: "asNeeded",
    intervalHours: 8,
    options: [
      { label: "1", value: "200" },
      { label: "2", value: "400" },
      { label: "3", value: "600" }
    ]
  },
  {
    name: "Aspirin",
    type: "scheduled",
    fixedTimes: ["8:30 AM", "10:30 PM"]
  },
  {
    name: "Gabapentin",
    type: "scheduled",
    fixedTimes: ["8:30 AM", "10:30 PM"],
    options: [
      { label: "1", value: "300" },
      { label: "2", value: "600" },
      { label: "3", value: "900" }
    ]
  },
  {
    name: "Oxycodone 10 mg",
    type: "asNeeded",
    intervalHours: 4
  },
  {
    name: "Hydrocodone",
    type: "asNeeded",
    intervalHours: 6,
    options: [
      { label: "1", value: "1" },
      { label: "2", value: "2" }
    ]
  },
  {
    name: "Stool Softener",
    type: "scheduled",
    fixedTimes: ["8:30 AM", "10:30 PM"]
  },
  {
    name: "Melatonin",
    type: "scheduled",
    fixedTimes: ["10:30 PM"]
  }
];

const medList = document.getElementById("medList");
const status = document.getElementById("status");
const activityList = document.getElementById("activityList");
const undoBtn = document.getElementById("undoBtn");

const manualMed = document.getElementById("manualMed");
const manualDose = document.getElementById("manualDose");
const manualHour = document.getElementById("manualHour");
const manualMinute = document.getElementById("manualMinute");
const manualAmPm = document.getElementById("manualAmPm");
const manualAddBtn = document.getElementById("manualAddBtn");

let latestActivityEntries = [];
let medsSnapshotData = {};

function setStatus(msg){
  status.textContent = msg || "";
}

function formatTime(date){
  let h = date.getHours();
  let m = date.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";

  h = h % 12 || 12;
  m = m < 10 ? "0" + m : m;

  return `${h}:${m} ${ampm}`;
}

function formatDateLabel(date){
  return date.toLocaleDateString(undefined, {
    weekday: "long",
    month: "long",
    day: "numeric"
  });
}

function getDayKey(date){
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function parseStoredTimestamp(value){
  if (!value) return null;
  const date = new Date(value);
  return isNaN(date.getTime()) ? null : date;
}

function formatActivityEntry(entry){
  const optionText = entry.option ? ` (${entry.option})` : "";
  return `${entry.med}${optionText} at ${entry.time.toLowerCase()}`;
}

function setUndoState(entries){
  undoBtn.disabled = !entries.length;
}

function getMedRecord(record){
  return {
    times: Array.isArray(record.times) ? record.times : [],
    timestamps: Array.isArray(record.timestamps) ? record.timestamps : [],
    options: Array.isArray(record.options) ? record.options : []
  };
}

function getLastTakenLabel(record){
  const safeRecord = getMedRecord(record);
  const lastTime = safeRecord.times.length ? safeRecord.times[safeRecord.times.length - 1] : null;
  const lastOption = safeRecord.options.length ? safeRecord.options[safeRecord.options.length - 1] : null;

  if (!lastTime) {
    return "Last taken: Not taken yet";
  }

  return `Last taken: ${lastTime}${lastOption ? ` • ${lastOption}` : ""}`;
}

function getTodayCount(record){
  const safeRecord = getMedRecord(record);
  const todayKey = getDayKey(new Date());

  return safeRecord.timestamps.reduce((count, timestamp) => {
    const parsed = parseStoredTimestamp(timestamp);
    if (!parsed) return count;
    return getDayKey(parsed) === todayKey ? count + 1 : count;
  }, 0);
}

function parseTimeLabelToDate(timeLabel, baseDate){
  const match = timeLabel.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
  if (!match) return null;

  let hours = parseInt(match[1], 10);
  const minutes = parseInt(match[2], 10);
  const ampm = match[3].toUpperCase();

  if (ampm === "PM" && hours !== 12) hours += 12;
  if (ampm === "AM" && hours === 12) hours = 0;

  const date = new Date(baseDate);
  date.setHours(hours, minutes, 0, 0);
  return date;
}

function formatTimeLabel(hour, minute, ampm){
  return `${hour}:${minute} ${ampm}`;
}

function getNextScheduledTime(med, record){
  if (!Array.isArray(med.fixedTimes) || !med.fixedTimes.length) return null;

  const todayCount = getTodayCount(record);
  if (todayCount >= med.fixedTimes.length) {
    return null;
  }

  const now = new Date();
  const todayTimes = med.fixedTimes
    .map(label => ({
      label,
      date: parseTimeLabelToDate(label, now)
    }))
    .filter(item => item.date);

  todayTimes.sort((a, b) => a.date - b.date);

  for (const item of todayTimes) {
    if (item.date >= now) {
      return item.label;
    }
  }

  return med.fixedTimes[Math.min(todayCount, med.fixedTimes.length - 1)] || null;
}

function getScheduledStatus(med, record){
  const nextTime = getNextScheduledTime(med, record);

  if (!nextTime) {
    return {
      text: "Today's doses logged",
      canTake: false
    };
  }

  return {
    text: `Next dose at ${nextTime}`,
    canTake: true
  };
}

function getAsNeededStatus(med, record){
  const safeRecord = getMedRecord(record);
  const lastTimestamp = safeRecord.timestamps.length
    ? parseStoredTimestamp(safeRecord.timestamps[safeRecord.timestamps.length - 1])
    : null;

  if (!lastTimestamp || !med.intervalHours) {
    return {
      text: "Can take now",
      canTake: true
    };
  }

  const nextAllowed = new Date(lastTimestamp.getTime() + med.intervalHours * 60 * 60 * 1000);
  const now = new Date();

  if (now >= nextAllowed) {
    return {
      text: "Can take now",
      canTake: true
    };
  }

  return {
    text: `Next available at ${formatTime(nextAllowed)}`,
    canTake: false
  };
}

function getSelectedOptionValue(selectEl, med){
  if (!selectEl || !Array.isArray(med.options)) return "";

  const selected = med.options.find(option => option.label === selectEl.value);
  return selected ? selected.value : "";
}

function getMedByName(name){
  return meds.find(med => med.name === name) || null;
}

async function saveMedEntry(medName, selectedOptionValue, time, timestamp){
  const medRef = db.collection("meds").doc(medName);
  const activityRef = db.collection("meta").doc("activityLog");

  await db.runTransaction(async (transaction) => {
    const medDoc = await transaction.get(medRef);
    const activityDoc = await transaction.get(activityRef);

    const medData = medDoc.exists ? (medDoc.data() || {}) : {};

    const existingTimes = Array.isArray(medData.times) ? medData.times.slice() : [];
    const existingTimestamps = Array.isArray(medData.timestamps) ? medData.timestamps.slice() : [];
    const existingOptions = Array.isArray(medData.options) ? medData.options.slice() : [];

    const updatedTimes = [...existingTimes, time].slice(-HISTORY_LIMIT);
    const updatedTimestamps = [...existingTimestamps, timestamp].slice(-HISTORY_LIMIT);
    const updatedOptions = [...existingOptions, selectedOptionValue].slice(-HISTORY_LIMIT);

    transaction.set(medRef, {
      times: updatedTimes,
      timestamps: updatedTimestamps,
      options: updatedOptions
    }, { merge: true });

    const existingEntries =
      activityDoc.exists && Array.isArray(activityDoc.data().entries)
        ? activityDoc.data().entries
        : [];

    const newEntry = {
      med: medName,
      option: selectedOptionValue,
      time: time,
      timestamp: timestamp,
      createdAt: Date.now()
    };

    const updatedEntries = [newEntry, ...existingEntries].slice(0, HISTORY_LIMIT);

    transaction.set(activityRef, {
      entries: updatedEntries
    }, { merge: true });
  });
}

async function takeMed(med, btn, selectEl){
  try{
    btn.disabled = true;
    btn.textContent = "SAVING";
    setStatus("Saving...");

    const now = new Date();
    const time = formatTime(now);
    const timestamp = now.toISOString();
    const selectedOptionValue = getSelectedOptionValue(selectEl, med);

    await saveMedEntry(med.name, selectedOptionValue, time, timestamp);

    setStatus("Saved");
    setTimeout(() => setStatus(""), 1000);

  } catch (err){
    console.error(err);
    setStatus("Could not save. Try again.");
  } finally{
    btn.disabled = false;
    btn.textContent = "TAKE NOW";
  }
}

async function addManualLog(){
  try{
    manualAddBtn.disabled = true;
    manualAddBtn.textContent = "SAVING";
    setStatus("Saving...");

    const medName = manualMed.value;
    const med = getMedByName(medName);
    const hour = manualHour.value;
    const minute = manualMinute.value;
    const ampm = manualAmPm.value;

    if (!medName || !hour || !minute || !ampm) {
      setStatus("Fill out the missed log first.");
      return;
    }

    let selectedOptionValue = "";
    if (med && Array.isArray(med.options) && med.options.length) {
      selectedOptionValue = getSelectedOptionValue(manualDose, med);
    }

    const now = new Date();
    const chosenTime = formatTimeLabel(hour, minute, ampm);
    const chosenDate = parseTimeLabelToDate(chosenTime, now);
    const timestamp = chosenDate ? chosenDate.toISOString() : now.toISOString();

    await saveMedEntry(medName, selectedOptionValue, chosenTime, timestamp);

    setStatus("Saved");
    setTimeout(() => setStatus(""), 1000);

  } catch (err){
    console.error(err);
    setStatus("Could not save missed log.");
  } finally{
    manualAddBtn.disabled = false;
    manualAddBtn.textContent = "ADD LOG";
  }
}

async function undoLast(){
  if (!latestActivityEntries.length) {
    return;
  }

  try{
    undoBtn.disabled = true;
    setStatus("Undoing...");

    await db.runTransaction(async (transaction) => {
      const activityRef = db.collection("meta").doc("activityLog");
      const activityDoc = await transaction.get(activityRef);

      const entries =
        activityDoc.exists && Array.isArray(activityDoc.data().entries)
          ? activityDoc.data().entries
          : [];

      if (!entries.length) {
        return;
      }

      const sortedEntries = entries
        .slice()
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

      const latestEntry = sortedEntries[0];
      const remainingEntries = sortedEntries.slice(1);

      const medRef = db.collection("meds").doc(latestEntry.med);
      const medDoc = await transaction.get(medRef);
      const medData = medDoc.exists ? (medDoc.data() || {}) : {};

      const medTimes = Array.isArray(medData.times) ? medData.times.slice() : [];
      const medTimestamps = Array.isArray(medData.timestamps) ? medData.timestamps.slice() : [];
      const medOptions = Array.isArray(medData.options) ? medData.options.slice() : [];

      const lastMatchingTimeIndex = medTimes.lastIndexOf(latestEntry.time);
      if (lastMatchingTimeIndex !== -1) {
        medTimes.splice(lastMatchingTimeIndex, 1);
      }

      if (latestEntry.timestamp) {
        const lastMatchingTimestampIndex = medTimestamps.lastIndexOf(latestEntry.timestamp);
        if (lastMatchingTimestampIndex !== -1) {
          medTimestamps.splice(lastMatchingTimestampIndex, 1);
        }
      }

      if (medOptions.length) {
        medOptions.pop();
      }

      transaction.set(activityRef, {
        entries: remainingEntries.slice(0, HISTORY_LIMIT)
      }, { merge: true });

      transaction.set(medRef, {
        times: medTimes.slice(-HISTORY_LIMIT),
        timestamps: medTimestamps.slice(-HISTORY_LIMIT),
        options: medOptions.slice(-HISTORY_LIMIT)
      }, { merge: true });
    });

    setStatus("Undone");
    setTimeout(() => setStatus(""), 1000);

  } catch (err){
    console.error(err);
    setStatus("Could not undo.");
    setUndoState(latestActivityEntries);
  }
}

function populateManualTimeSelectors(){
  manualHour.innerHTML = "";
  manualMinute.innerHTML = "";

  for (let i = 1; i <= 12; i++) {
    const option = document.createElement("option");
    option.value = String(i);
    option.textContent = String(i);
    manualHour.appendChild(option);
  }

  for (let i = 0; i < 60; i++) {
    const value = String(i).padStart(2, "0");
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    manualMinute.appendChild(option);
  }
}

function updateManualDoseSelector(){
  const med = getMedByName(manualMed.value);

  if (!med || !Array.isArray(med.options) || !med.options.length) {
    manualDose.style.display = "none";
    manualDose.innerHTML = "";
    return;
  }

  manualDose.style.display = "";
  manualDose.innerHTML = med.options
    .map(option => `<option value="${option.label}">${option.label}</option>`)
    .join("");
}

function populateManualMedSelector(){
  manualMed.innerHTML = meds
    .map(med => `<option value="${med.name}">${med.name}</option>`)
    .join("");

  updateManualDoseSelector();
}

function renderMedicineList(data){
  medList.innerHTML = "";

  meds.forEach(med => {
    const record = data[med.name] || {};
    const lastTakenText = getLastTakenLabel(record);

    let planText = "";
    let statusText = "";
    let canTake = true;

    if (med.type === "scheduled") {
      planText = med.fixedTimes.join(" • ");
      const scheduledStatus = getScheduledStatus(med, record);
      statusText = scheduledStatus.text;
      canTake = scheduledStatus.canTake;
    } else {
      planText = `${med.intervalHours} hour interval`;
      const asNeededStatus = getAsNeededStatus(med, record);
      statusText = asNeededStatus.text;
      canTake = asNeededStatus.canTake;
    }

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div class="left">
        <div class="med-name">${med.name}</div>
        <div class="med-plan">${planText}</div>
        <div class="med-time">${lastTakenText}</div>
        <div class="med-next">${statusText}</div>
      </div>
      <div class="right">
        ${Array.isArray(med.options) && med.options.length ? `
          <select class="dose-select">
            ${med.options.map(option => `<option value="${option.label}">${option.label}</option>`).join("")}
          </select>
        ` : ""}
        <button class="take-btn ${canTake ? "" : "wait-state"}">${canTake ? "TAKE NOW" : "WAIT"}</button>
      </div>
    `;

    const btn = row.querySelector(".take-btn");
    const selectEl = row.querySelector(".dose-select");

    btn.onclick = () => takeMed(med, btn, selectEl);

    medList.appendChild(row);
  });
}

function renderActivity(entries){
  if (!entries.length){
    activityList.innerHTML = `<div class="empty-activity">No activity yet</div>`;
    latestActivityEntries = [];
    setUndoState(entries);
    return;
  }

  const sorted = entries
    .slice()
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
    .slice(0, HISTORY_LIMIT);

  latestActivityEntries = sorted;
  setUndoState(sorted);

  const grouped = [];

  sorted.forEach(entry => {
    const entryDate = parseStoredTimestamp(entry.timestamp) || new Date(entry.createdAt || Date.now());
    const dayKey = getDayKey(entryDate);

    let group = grouped.find(item => item.dayKey === dayKey);
    if (!group) {
      group = {
        dayKey,
        label: formatDateLabel(entryDate),
        entries: []
      };
      grouped.push(group);
    }

    group.entries.push(entry);
  });

  activityList.innerHTML = grouped.map(group => {
    const items = group.entries.map(entry => {
      return `<div class="activity-item">${formatActivityEntry(entry)}</div>`;
    }).join("");

    return `
      <div class="activity-day">
        <div class="activity-day-header">${group.label}</div>
        ${items}
      </div>
    `;
  }).join("");
}

manualMed.addEventListener("change", updateManualDoseSelector);
manualAddBtn.addEventListener("click", addManualLog);
undoBtn.addEventListener("click", undoLast);

db.collection("meds").onSnapshot(snapshot => {
  const data = {};

  snapshot.forEach(doc => {
    data[doc.id] = doc.data() || {};
  });

  medsSnapshotData = data;
  renderMedicineList(data);
});

db.collection("meta").doc("activityLog").onSnapshot(doc => {
  const entries = (doc.exists && Array.isArray(doc.data().entries)) ? doc.data().entries : [];
  latestActivityEntries = entries
    .slice()
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
    .slice(0, HISTORY_LIMIT);
  renderActivity(entries);
});

populateManualTimeSelectors();
populateManualMedSelector();
setUndoState([]);

setInterval(() => {
  renderMedicineList(medsSnapshotData);
}, 30000);
</script>
